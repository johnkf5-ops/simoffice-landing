<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimOffice — Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .download-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .download-box {
        max-width: 520px;
        text-align: center;
      }
      .download-box h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      .download-box p {
        color: var(--muted);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .download-buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
      }
      .download-buttons a {
        width: 100%;
        max-width: 320px;
        text-align: center;
      }
      .status-msg {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .error-msg {
        color: #ef4444;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="download-page">
        <div class="download-box">
          <h1>Welcome to SimOffice</h1>
          <p id="status" class="status-msg">Verifying your subscription...</p>
          <div id="downloads" style="display: none;">
            <p>Your subscription is active. Download SimOffice below.</p>
            <div class="download-buttons">
              <a id="dl-arm64" class="primary-button" href="#">Download for Apple Silicon</a>
              <a id="dl-x64" class="ghost-button" href="#">Download for Intel Mac</a>
            </div>
            <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--muted);">
              Tip: Right-click the app and select Open on first launch to bypass macOS Gatekeeper.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script>
      (async () => {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        const status = document.getElementById('status');
        const downloads = document.getElementById('downloads');

        if (!sessionId) {
          status.textContent = 'No session found. Please subscribe first.';
          status.className = 'error-msg';
          return;
        }

        try {
          // Verify and get ARM64 link
          const arm64Res = await fetch(`/api/download?session_id=${sessionId}&arch=arm64`);
          const arm64Data = await arm64Res.json();

          if (!arm64Data.valid) {
            status.textContent = 'Payment could not be verified. Please contact support.';
            status.className = 'error-msg';
            return;
          }

          const x64Res = await fetch(`/api/download?session_id=${sessionId}&arch=x64`);
          const x64Data = await x64Res.json();

          document.getElementById('dl-arm64').href = arm64Data.url;
          document.getElementById('dl-x64').href = x64Data.url;

          status.style.display = 'none';
          downloads.style.display = 'block';
        } catch (err) {
          status.textContent = 'Something went wrong. Please try again.';
          status.className = 'error-msg';
        }
      })();
    </script>
  </body>
</html>
